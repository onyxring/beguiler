name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: macos-arm64
            artifact: beguiler-macos-arm64
            ext: ''
          - os: macos-13
            target: macos-x86_64
            artifact: beguiler-macos-x86_64
            ext: ''
          - os: ubuntu-22.04
            target: linux-x64
            artifact: beguiler-linux-x64
            ext: ''
          - os: windows-2022
            target: windows-x64
            artifact: beguiler-windows-x64.exe
            ext: '.exe'

    steps:
      - uses: actions/checkout@v4

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: |
          c++ -std=c++20 -O2 -Wno-deprecated-declarations *.cpp -o beguiler${{ matrix.ext }}

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          clang++ -std=c++20 -O2 -Wno-deprecated-declarations (Get-ChildItem -Filter *.cpp).Name -o beguiler.exe

      - name: Rename artifact
        shell: bash
        run: mv beguiler${{ matrix.ext }} ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          draft: true
          generate_release_notes: true
