name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: macos-arm64
            cxx: c++
            cflags: '-arch arm64'
            archive: tar.gz
          - os: macos-15
            target: macos-x86_64
            cxx: c++
            cflags: '-arch x86_64'
            archive: tar.gz
          - os: ubuntu-24.04
            target: linux-x64
            cxx: clang++
            install: 'sudo apt-get update && sudo apt-get install -y clang libc++-dev libc++abi-dev'
            cflags: '-stdlib=libc++ -Disnumber=isdigit'
            archive: tar.gz
          - os: windows-2022
            target: windows-x64
            cxx: clang++
            cflags: '-Disnumber=isdigit -Dstrncasecmp=_strnicmp -Dpopen=_popen -Dpclose=_pclose'
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        if: matrix.install != ''
        run: ${{ matrix.install }}

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: |
          ${{ matrix.cxx }} -std=c++20 -O2 -Wno-deprecated-declarations -include format -include functional ${{ matrix.cflags }} *.cpp -o beguiler

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ${{ matrix.cxx }} -std=c++20 -O2 -Wno-deprecated-declarations -include format -include functional ${{ matrix.cflags }} (Get-ChildItem -Filter *.cpp).Name -o beguiler.exe

      - name: Bundle release archive
        shell: bash
        run: |
          BUNDLE="beguile-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir "$BUNDLE"
          if [ -f beguiler.exe ]; then cp beguiler.exe "$BUNDLE/"; else cp beguiler "$BUNDLE/"; fi
          tar cf - beguiLib | tar xf - -C "$BUNDLE"
          tar cf - docs     | tar xf - -C "$BUNDLE"
          cp LICENSE README.md CHANGELOG.md "$BUNDLE/"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            7z a "${BUNDLE}.zip" "$BUNDLE" >/dev/null
          else
            tar czf "${BUNDLE}.tar.gz" "$BUNDLE"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            beguile-*.tar.gz
            beguile-*.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          draft: true
          prerelease: true
          generate_release_notes: true
